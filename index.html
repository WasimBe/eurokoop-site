<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website in onderhoud</title>
    <style>
        body {
            background-color: #f9fafb;
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            animation: fadeIn 1.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .container {
            max-width: 400px;
        }
        img.logo {
            max-width: 150px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.75rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1rem;
            color: #4b5563;
            margin-bottom: 1rem;
        }
        .social-links a {
            display: inline-block;
            margin: 0 10px;
            color: #1f2937;
            text-decoration: none;
            font-size: 1.5rem;
        }
        .social-links a:hover {
            color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="IMG_0001.jpg" alt="bedrijfslogo" class="logo" />
        <h1>Onze website zit in rebranding!</h1>

    <p>© EuroKoop All Rights Reserved</p>
    </div>
</body>
</html>
